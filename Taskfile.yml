version: "3"

dotenv: [".env"]

tasks:
  default:
    desc: Rebuild and restart everything
    cmds:
      - docker compose down
      - docker compose up --build

  up:
    desc: Start all services (build if needed)
    cmds:
      - docker compose up --build

  up:detach:
    desc: Start all services in the background
    cmds:
      - docker compose up --build -d

  down:
    desc: Stop and remove all containers
    cmds:
      - docker compose down

  rebuild:
    desc: Rebuild and restart (same as default)
    cmds:
      - docker compose down
      - docker compose up --build

  reset:
    desc: Nuke everything (wipes DB) and rebuild fresh
    cmds:
      - docker compose down -v
      - docker compose up --build

  down:clean:
    desc: Stop containers and remove volumes (wipes DB)
    cmds:
      - docker compose down -v

  logs:
    desc: Tail API container logs
    cmds:
      - docker compose logs -f api

  test:
    desc: Run integration tests inside the API container
    cmds:
      - docker compose exec api pytest -v

  migrate:
    desc: Run database migrations
    cmds:
      - docker compose exec api alembic upgrade head

  migrate:down:
    desc: Roll back the last migration
    cmds:
      - docker compose exec api alembic downgrade -1

  seed:
    desc: Run the database seed script
    cmds:
      - docker compose exec api python scripts/seed.py

  populate:
    desc: Create sample users, projects, and tasks for manual testing
    cmds:
      - ./scripts/populate.sh

  shell:
    desc: Open a shell inside the API container
    cmds:
      - docker compose exec api bash

  db:shell:
    desc: Open a psql shell to the database
    cmds:
      - docker compose exec db psql -U ${POSTGRES_USER} -d ${POSTGRES_DB}
